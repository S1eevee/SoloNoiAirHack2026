services:
  - type: web
    name: solonoi-airhack
    runtime: docker
    region: frankfurt
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: API_BASE
        value: http://127.0.0.1:8000
      - key: PUBLIC_API_BASE
        value: /api
      - key: FASTAPI_ROOT_PATH
        value: /api
      - key: PERSISTENT_STORAGE_DIR
        value: /var/data
      - key: API_KEY_HASH_ALGO
        value: sha256
      - key: JWT_ALGORITHM
        value: HS256
      - key: SECRET_KEY
        generateValue: true
      - key: API_KEY
        generateValue: true
